version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: tech_trend_db
    environment:
      POSTGRES_USER: techuser
      POSTGRES_PASSWORD: techpass
      POSTGRES_DB: techtrend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U techuser -d techtrend" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tech_trend_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tech_trend_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tech_trend_network
    restart: unless-stopped

  app:
    build: .
    container_name: tech_trend_app
    environment:
      - DATABASE_URL=postgresql://techuser:techpass@db:5432/techtrend
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-here-change-in-production
      - DEBUG=True
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tech_trend_network
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: tech_trend_celery_worker
    command: celery -A app.services.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://techuser:techpass@db:5432/techtrend
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - tech_trend_network
    restart: unless-stopped

  celery_beat:
    build: .
    container_name: tech_trend_celery_beat
    command: celery -A app.services.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://techuser:techpass@db:5432/techtrend
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - tech_trend_network
    restart: unless-stopped

  flower:
    build: .
    container_name: tech_trend_flower
    command: celery -A app.services.celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - tech_trend_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tech_trend_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - tech_trend_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tech_trend_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - tech_trend_network
    restart: unless-stopped

  # ── W14: Observability ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: tech_trend_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - tech_trend_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tech_trend_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tech_trend_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:


networks:
  tech_trend_network:
    driver: bridge
